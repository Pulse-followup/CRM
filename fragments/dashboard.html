<section id="dashboardView" class="view active">
  <section class="dashboard-stack home-dashboard-stack">
    <div class="workspace-view-title">
      <h2 id="dashboardRoleTitle">Zadaci</h2>
      <p id="dashboardWorkspaceTitle" class="workspace-view-subtitle">Bez workspace-a</p>
    </div>

    <section class="panel panel-today dashboard-area-today">
      <div class="panel-head home-panel-head">
        <div>
          <h3 id="dashboardTaskListTitle">Svi zadaci</h3>
          <p id="dashboardTaskListSubtitle" class="panel-subtext">Pregled taskova iz svih projekata.</p>
        </div>
      </div>

      <div class="task-filter-row" id="taskListFilterRow">
        <button class="btn btn-secondary btn-sm is-active" type="button" data-task-list-filter="all">Svi</button>
        <button class="btn btn-secondary btn-sm" type="button" data-task-list-filter="active">Aktivni</button>
        <button class="btn btn-secondary btn-sm" type="button" data-task-list-filter="mine">Moji</button>
      </div>

      <div id="taskList" class="global-task-list"></div>

      <div id="taskListEmpty" class="empty-state hidden">
        <h4>Nema zadataka</h4>
        <p>Promeni filter ili kreiraj task iz projekta.</p>
      </div>
    </section>
  </section>
</section>
