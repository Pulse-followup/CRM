<div id="clientModal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" id="clientModalBackdrop"></div>

  <div class="modal-panel">
    <div class="modal-head">
      <div>
        <h3 id="clientModalTitle">Novi klijent</h3>
        <p id="clientModalSubtitle">Azuriraj osnovne podatke klijenta.</p>
      </div>

      <button id="closeClientModalBtn" class="icon-btn" aria-label="Zatvori">x</button>
    </div>

    <form id="clientForm" class="modal-body form-grid" novalidate>
      <input type="hidden" id="clientId" />

      <section class="form-section form-section-general">
        <h4>Osnovni podaci</h4>
        <p class="form-section-hint">Podaci koji timu najcesce trebaju za brz kontakt i rad iz drawer-a.</p>

        <div class="form-two-col">
          <div class="field">
            <label for="clientName">Naziv klijenta</label>
            <input
              id="clientName"
              class="input"
              type="text"
              placeholder="npr. Apotekarski lanac"
              required
            />
          </div>

          <div class="field">
            <label for="clientCity">Grad</label>
            <input
              id="clientCity"
              class="input"
              type="text"
              placeholder="npr. Beograd"
            />
          </div>
        </div>

        <div class="field">
          <label for="clientAddress">Adresa</label>
          <input
            id="clientAddress"
            class="input"
            type="text"
            placeholder="npr. Bulevar kralja Aleksandra 10"
          />
        </div>

      </section>

      <section class="form-section form-section-general">
        <h4>Kontakti</h4>
        <p class="form-section-hint">Osnovni kontakt za komunikaciju sa klijentom.</p>

        <div class="form-subgroup">
          <div class="form-two-col">
            <div class="field">
              <label for="contactPerson">Ime</label>
              <input
                id="contactPerson"
                class="input"
                type="text"
                placeholder="npr. Marko Markovic"
              />
            </div>

            <div class="field">
              <label for="contactRole">Funkcija</label>
              <select id="contactRole" class="input">
                <option value="">Izaberi</option>
                <option value="vlasnik">Vlasnik</option>
                <option value="prodaja">Prodaja</option>
                <option value="marketing">Marketing</option>
                <option value="finansije">Finansije</option>
              </select>
            </div>
          </div>

          <div class="form-two-col">
            <div class="field">
              <label for="contactEmail">Email</label>
              <input
                id="contactEmail"
                class="input"
                type="email"
                placeholder="npr. ime@firma.rs"
              />
            </div>

            <div class="field">
              <label for="contactPhone">Telefon</label>
              <input
                id="contactPhone"
                class="input"
                type="text"
                placeholder="npr. 06x..."
              />
            </div>
          </div>
        </div>
      </section>

      <section class="form-section form-section-commercial">
        <h4>Komercijalni inputi</h4>
        <p class="form-section-hint">Osnovni komercijalni kontekst za Customer Card.</p>

        <div class="form-two-col">
          <div class="field">
            <label for="businessType">Tip delatnosti</label>
            <select id="businessType" class="input">
              <option value="">Izaberi</option>
              <option value="apoteka">Apoteka</option>
              <option value="maloprodaja">Maloprodaja</option>
              <option value="ugostiteljstvo">Ugostiteljstvo</option>
              <option value="usluge">Usluge</option>
              <option value="drzavne_institucije">Drzavne institucije</option>
              <option value="proizvodnja">Proizvodnja</option>
              <option value="distribucija">Distribucija</option>
              <option value="ostalo">Ostalo</option>
            </select>
          </div>

          <div class="field">
            <label for="revenueBand">Promet</label>
            <select id="revenueBand" class="input">
              <option value="">Izaberi</option>
              <option value="small">Mali</option>
              <option value="medium">Srednji</option>
              <option value="large">Veliki</option>
            </select>
          </div>
        </div>

        <div class="form-two-col">
          <div class="field">
            <label for="employeeCount">Broj zaposlenih</label>
            <input id="employeeCount" class="input" type="number" min="0" step="1" />
          </div>

          <div class="field">
            <label for="locationCount">Broj objekata</label>
            <input id="locationCount" class="input" type="number" min="0" step="1" />
          </div>
        </div>

        <div class="form-two-col">
          <div class="field">
            <label for="decisionLevel">Nivo odlucivanja</label>
            <select id="decisionLevel" class="input">
              <option value="">Izaberi</option>
              <option value="owner">Vlasnik</option>
              <option value="management">Management</option>
              <option value="local">Lokalno</option>
            </select>
          </div>

          <div class="field">
            <label for="relationshipLevel">Odnos</label>
            <select id="relationshipLevel" class="input">
              <option value="">Izaberi</option>
              <option value="new">Novi klijent</option>
              <option value="communication">Imamo komunikaciju</option>
              <option value="trust">Izgradjeno poverenje</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="innovationReady">Spremnost za inovacije</label>
          <select id="innovationReady" class="input">
            <option value="">Izaberi</option>
            <option value="yes">Da</option>
            <option value="no">Ne</option>
          </select>
        </div>
      </section>

      <div class="form-actions">
        <button type="button" id="deleteClientBtn" class="btn btn-danger hidden">Obrisi</button>

        <div class="form-actions-right">
          <button type="button" id="cancelClientBtn" class="btn btn-secondary">Otkazi</button>
          <button type="submit" class="btn btn-primary">Sacuvaj klijenta</button>
        </div>
      </div>
    </form>
  </div>
</div>
