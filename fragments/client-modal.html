<div id="clientModal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" id="clientModalBackdrop"></div>

  <div class="modal-panel">
    <div class="modal-head">
      <div>
        <h3 id="clientModalTitle">Novi klijent</h3>
        <p id="clientModalSubtitle">Brz unos osnovnih podataka i komercijalne procene.</p>
      </div>

      <button id="closeClientModalBtn" class="icon-btn" aria-label="Zatvori">x</button>
    </div>

    <form id="clientForm" class="modal-body form-grid" novalidate>
      <input type="hidden" id="clientId" />

      <section class="form-section form-section-general">
        <h4>Osnovno</h4>

        <div class="field">
          <label for="clientName">Naziv klijenta</label>
          <input
            id="clientName"
            class="input"
            type="text"
            placeholder="npr. Apotekarski lanac"
            required
          />
        </div>

        <div class="field">
          <label for="clientCity">Grad</label>
          <input
            id="clientCity"
            class="input"
            type="text"
            placeholder="npr. Beograd"
          />
        </div>
      </section>

      <section class="form-section form-section-contact">
        <h4>Kontakt</h4>

        <div class="field">
          <label for="contactPerson">Kontakt osoba</label>
          <input
            id="contactPerson"
            class="input"
            type="text"
            placeholder="npr. Marko Markovic"
          />
        </div>

        <div class="field">
          <label for="contactPhone">Telefon</label>
          <input
            id="contactPhone"
            class="input"
            type="text"
            placeholder="npr. 06x..."
          />
        </div>

        <div class="field">
          <label for="contactEmail">Email</label>
          <input
            id="contactEmail"
            class="input"
            type="email"
            placeholder="npr. ime@firma.rs"
          />
        </div>
      </section>

      <section class="form-section form-section-commercial">
        <h4>Komercijalni fit</h4>

        <div class="field">
          <label for="companySize">Velicina klijenta</label>
          <select id="companySize" class="input" required>
            <option value="">Izaberi</option>
            <option value="1">Mali</option>
            <option value="2-5">Srednji</option>
            <option value="5+">Veliki</option>
          </select>
        </div>

        <div class="field">
          <label for="decisionModel">Nacin odlucivanja</label>
          <select id="decisionModel" class="input" required>
            <option value="">Izaberi</option>
            <option value="local">Vlasnik / direktno</option>
            <option value="regional">Menadzer / lokalno</option>
            <option value="central">Centrala / vise nivoa</option>
          </select>
        </div>

        <div class="field">
          <label for="revenueDriverPrimary">Revenue fokus</label>
          <select id="revenueDriverPrimary" class="input" required>
            <option value="">Izaberi</option>
            <option value="services">Usluge</option>
            <option value="core_assortment">Roba / asortiman</option>
            <option value="promo_sales">Akcije / promo</option>
            <option value="premium">Premium / konsulting</option>
            <option value="consultative">Savetodajna prodaja</option>
            <option value="projects">Projekti / piloti</option>
          </select>
        </div>

        <div class="field">
          <label for="leadTemperature">Koliko je lead zagrejan</label>
          <select id="leadTemperature" class="input" required>
            <option value="">Izaberi</option>
            <option value="cold">Hladan</option>
            <option value="warm">Topao</option>
            <option value="hot">Vruc</option>
          </select>
        </div>

        <div class="field">
          <label for="budgetStatus">Budzet / spremnost</label>
          <select id="budgetStatus" class="input" required>
            <option value="">Izaberi</option>
            <option value="unknown">Nepoznato</option>
            <option value="exploring">Ispituju opcije</option>
            <option value="planned">Planiran budzet</option>
            <option value="approved">Odobren budzet</option>
          </select>
        </div>

        <div class="field">
          <label for="urgencyLevel">Urgentnost potrebe</label>
          <select id="urgencyLevel" class="input" required>
            <option value="">Izaberi</option>
            <option value="low">Niska</option>
            <option value="medium">Srednja</option>
            <option value="high">Visoka</option>
          </select>
        </div>

        <div class="field">
          <label for="pilotReadiness">Spremnost za pilot</label>
          <select id="pilotReadiness" class="input" required>
            <option value="">Izaberi</option>
            <option value="none">Nema interesa</option>
            <option value="possible">Postoji potencijal</option>
            <option value="discussed">Pilot je u razgovoru</option>
            <option value="confirmed">Pilot dogovoren</option>
          </select>
        </div>

        <div class="field">
          <label for="relationshipStrength">Jacina odnosa</label>
          <select id="relationshipStrength" class="input" required>
            <option value="">Izaberi</option>
            <option value="new">Novi kontakt</option>
            <option value="working">Imamo komunikaciju</option>
            <option value="trusted">Dobar odnos i poverenje</option>
          </select>
        </div>
      </section>

      <section class="form-section form-section-status">
        <h4>Beleska</h4>

        <div class="field">
          <label for="lastActionNote">Kratka beleska</label>
          <textarea
            id="lastActionNote"
            class="input textarea"
            placeholder="npr. Dogovoren pilot na lokaciji Galerija, cekamo termin."
          ></textarea>
        </div>

        <div class="field">
          <label for="nextStepText">Sledeci korak</label>
          <input
            id="nextStepText"
            class="input"
            type="text"
            placeholder="npr. Pozvati nakon slanja ponude"
          />
        </div>

        <div class="field">
          <label for="nextStepType">Tip sledeceg koraka</label>
          <select id="nextStepType" class="input">
            <option value="">Izaberi</option>
            <option value="followup">Follow-up</option>
            <option value="call">Poziv</option>
            <option value="meeting">Sastanak</option>
            <option value="offer">Ponuda</option>
            <option value="decision">Odluka</option>
            <option value="task">Interni task</option>
          </select>
        </div>

        <div class="field">
          <label for="nextStepDate">Datum sledeceg koraka</label>
          <input id="nextStepDate" class="input" type="date" />
        </div>
      </section>

      <section id="dealInfoSection" class="form-section form-section-status" data-pro-feature="deal_info">
        <h4>Deal info</h4>

        <p id="dealInfoLockedNote" class="inline-upsell-note hidden">
          Deal info je deo Pro paketa. Otkljucaj Pro za pracenje vrednosti prilike, verovatnoce i datuma odluke.
        </p>

        <div class="field">
          <label for="dealValue">Procenjena vrednost prilike</label>
          <input
            id="dealValue"
            class="input"
            type="number"
            min="0"
            step="1"
            placeholder="npr. 3500"
          />
        </div>

        <div class="field">
          <label for="dealProbability">Verovatnoca zatvaranja</label>
          <select id="dealProbability" class="input">
            <option value="">Izaberi</option>
            <option value="25">25% - rano interesovanje</option>
            <option value="50">50% - realna prilika</option>
            <option value="75">75% - ozbiljni pregovori</option>
            <option value="90">90% - pred zatvaranjem</option>
          </select>
        </div>

        <div class="field">
          <label for="expectedDecisionDate">Ocekivani datum odluke</label>
          <input id="expectedDecisionDate" class="input" type="date" />
        </div>
      </section>

      <div class="form-actions">
        <button type="button" id="deleteClientBtn" class="btn btn-danger hidden">Obrisi</button>

        <div class="form-actions-right">
          <button type="button" id="cancelClientBtn" class="btn btn-secondary">Otkazi</button>
          <button type="submit" class="btn btn-primary">Sacuvaj klijenta</button>
        </div>
      </div>
    </form>
  </div>
</div>
