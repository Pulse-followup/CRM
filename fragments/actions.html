<section id="actionsView" class="view">
  <div class="workspace-view-title workspace-view-title-compact">
    <h2 id="actionsViewTitle">Tim - Bez workspace-a</h2>
  </div>

  <section class="panel">
    <div class="panel-head">
      <h3>Skorasnje aktivnosti</h3>
      <p id="teamFeedHint">Ovde ces videti sta je tim poslednje radio nad klijentima i workspace-om.</p>
    </div>

    <div class="field team-client-filter">
      <label for="teamClientFilter">Klijent</label>
      <select id="teamClientFilter" class="input">
        <option value="all">Svi klijenti</option>
      </select>
    </div>

    <div id="teamActivityEmpty" class="empty-state">
      <h4>Jos nema timskih aktivnosti</h4>
      <p>Cim evidentiras novu aktivnost ili status nad klijentom, ovde ce se pojaviti trag za ceo workspace.</p>
    </div>

    <div id="teamActivityList" class="cards-list hidden"></div>
  </section>
</section>
