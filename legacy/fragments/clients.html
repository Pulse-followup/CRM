<section id="clientsView" class="view">
  <div class="workspace-view-title workspace-view-title-compact clients-view-header">
    <h2 id="clientsViewTitle">Klijenti</h2>
  </div>

  <section class="panel clients-list-shell">
    <div class="clients-control-bar">
      <div class="clients-control-search">
        <input
          type="search"
          id="clientSearch"
          class="input search-input"
          placeholder="Pretraga klijenata..."
        />
      </div>

      <div class="clients-toolbar-actions">
        <button id="addClientBtnMobilePanel" class="btn btn-primary">+ Novi klijent</button>
        <div class="clients-header-menu" data-clients-header-menu>
          <button
            id="clientsHeaderMenuToggle"
            class="btn btn-secondary clients-header-menu-toggle"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="clientsHeaderMenu"
          >
            &hellip;
          </button>
          <div id="clientsHeaderMenu" class="clients-header-menu-popover hidden" aria-hidden="true">
            <label for="importClientsInputMobilePanel" class="clients-header-menu-item import-label" data-clients-header-menu-close>Import baze</label>
            <button id="exportClientsBtnMobilePanel" class="clients-header-menu-item" type="button" data-clients-header-menu-close>Export baze</button>
          </div>
        </div>
        <input id="importClientsInputMobilePanel" type="file" accept="application/json" class="hidden-file-input" />
      </div>
    </div>

    <div id="clientsModeBar" class="clients-mode-bar hidden">
      <span id="clientsModeLabel" class="badge info">Prikaz</span>
      <button id="clearClientsModeBtn" class="btn btn-secondary btn-sm" type="button">Prikazi sve</button>
    </div>

    <div id="clientsList" class="cards-list"></div>

    <div id="clientsEmpty" class="empty-state hidden">
      <h4>Nema klijenata</h4>
      <p>Klikni na "Novi klijent" i kreiraj prvi zapis.</p>
      <button id="addClientBtnEmpty" class="btn btn-primary clients-empty-action" type="button">+ Novi klijent</button>
    </div>
  </section>
</section>
