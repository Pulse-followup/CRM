<div id="activityModal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" id="activityModalBackdrop"></div>

  <div class="modal-panel">
    <div class="modal-head">
      <div>
        <h3 id="activityModalTitle">Nova aktivnost</h3>
        <p id="activityModalSubtitle">Evidentiraj sledeci korak ili internu napomenu za klijenta.</p>
      </div>

      <button id="closeActivityModalBtn" class="icon-btn" aria-label="Zatvori">x</button>
    </div>

    <form id="activityForm" class="modal-body" novalidate>
      <div class="action-meta">
        <span id="activityClientBadge" class="badge">Klijent</span>
      </div>

      <div id="activityLockedProjectWrap" class="locked-project-context hidden">
        <span>Projekat</span>
        <strong id="activityLockedProjectName">Projekat</strong>
        <small>Ova aktivnost ostaje u istom projektu.</small>
      </div>

      <div class="modal-subsection">
        <div id="activityProjectModeWrap" class="field">
          <label for="activityProjectMode">Projekat</label>
          <select id="activityProjectMode" class="input">
            <option value="new">Novi projekat</option>
            <option value="existing">Postojeci projekat</option>
          </select>
        </div>

        <div id="activityExistingProjectWrap" class="field hidden">
          <label for="activityProjectSelect">Izaberi projekat</label>
          <select id="activityProjectSelect" class="input">
            <option value="">Izaberi projekat</option>
          </select>
        </div>

        <div id="activityNewProjectFields" class="project-form-grid">
          <div class="field">
            <label for="activityProjectName">Naziv projekta</label>
            <input id="activityProjectName" class="input" type="text" placeholder="npr. Pilot postavka ekrana" />
          </div>

          <div class="field">
            <label for="activityProjectUrgency">Urgentnost posla</label>
            <select id="activityProjectUrgency" class="input">
              <option value="high">Visoka</option>
              <option value="medium" selected>Srednja</option>
              <option value="low">Niska</option>
            </select>
          </div>

          <div class="field">
            <label for="activityProjectBudget">Budzet</label>
            <select id="activityProjectBudget" class="input">
              <option value="unknown">Nepoznato</option>
              <option value="planned">Planiran budzet</option>
              <option value="approved">Odobren budzet</option>
            </select>
          </div>

          <div class="field">
            <label for="activityProjectValue">Procenjena vrednost</label>
            <input id="activityProjectValue" class="input" type="number" min="0" step="1" placeholder="npr. 5000" />
          </div>

          <div class="field">
            <label for="activityProjectEndDate">Ocekivani kraj</label>
            <input id="activityProjectEndDate" class="input" type="date" />
          </div>
        </div>
      </div>

      <div class="field">
        <label for="activityType">Tip aktivnosti</label>
        <select id="activityType" class="input" required>
          <option value="">Izaberi aktivnost</option>
          <option value="phone_call">Poziv</option>
          <option value="email">Mail</option>
          <option value="message">Poruka</option>
          <option value="meeting_held">Sastanak</option>
          <option value="offer_sent">Ponuda</option>
          <option value="production">Izrada</option>
          <option value="internal_note">Interna beleska</option>
        </select>
      </div>

      <div class="field">
        <label for="activityNote">Napomena</label>
        <textarea
          id="activityNote"
          class="input textarea textarea-lg"
          placeholder="Npr. Cujemo se sa klijentom u cetvrtak ili cekamo interni odgovor."
        ></textarea>
      </div>

      <label id="activityCompleteTaskWrap" class="task-builder-toggle hidden" for="activityCompleteCurrentTask">
        <span>
          <strong>Ova aktivnost zavrsava moj zadatak</strong>
          <small>Koristi kada si uradio delegirani zadatak i zelis da zatvoris obavezu.</small>
        </span>
        <input id="activityCompleteCurrentTask" type="checkbox" />
      </label>

      <label class="task-builder-toggle" for="activityCreateTask">
        <span>
          <strong>Delegiraj zadatak</strong>
          <small>Ako iz ove aktivnosti nastaje obaveza, izaberi vlasnika i rok.</small>
        </span>
        <input id="activityCreateTask" type="checkbox" />
      </label>

      <div id="activityTaskFields" class="modal-subsection hidden">
        <div class="field">
          <label for="activityTaskDueDate">Rok zadatka</label>
          <input id="activityTaskDueDate" class="input" type="date" />
        </div>

        <div class="field">
          <label for="activityTaskOwner">Vlasnik zadatka</label>
          <select id="activityTaskOwner" class="input">
            <option value="">Izaberi clana tima</option>
          </select>
        </div>

        <div class="field">
          <label for="activityTaskStatus">Status</label>
          <select id="activityTaskStatus" class="input">
            <option value="open">Otvoren</option>
            <option value="in_progress">U toku</option>
            <option value="waiting">Na cekanju</option>
          </select>
        </div>
      </div>

      <div class="action-modal-actions">
        <button type="button" id="cancelActivityBtn" class="btn btn-secondary">Otkazi</button>
        <button type="submit" class="btn btn-primary">Sacuvaj aktivnost</button>
      </div>
    </form>
  </div>
</div>
